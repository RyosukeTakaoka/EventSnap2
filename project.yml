name: EventSnap2

options:
  bundleIdPrefix: app.takaoka.com
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  EventSnap2:
    type: application
    platform: iOS
    sources:
      - EventSnapApp.swift
      - Models
      - ViewModels
      - Views
      - Services

    resources:
      - Assets.xcassets

    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: EventSnap
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: イベントの写真を撮影するためにカメラを使用します
        NSPhotoLibraryAddUsageDescription: 撮影した写真を保存するために写真ライブラリへのアクセスが必要です
        NSPhotoLibraryUsageDescription: アルバムから写真を選択するために写真ライブラリへのアクセスが必要です
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIBackgroundModes:
          - fetch
          - remote-notification
        UILaunchScreen:
          UIColorName: AccentColor
          UIImageName: LaunchImage
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    entitlements:
      path: EventSnap.entitlements

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.takaoka.com.EventSnap2
        PRODUCT_NAME: EventSnap
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGN_ENTITLEMENTS: EventSnap.entitlements
        ENABLE_PREVIEWS: true
        DEVELOPMENT_ASSET_PATHS: ""
      configs:
        Debug:
          DEVELOPMENT_TEAM: ""
        Release:
          DEVELOPMENT_TEAM: ""
